name: Daily Site Data Refresh

on:
  schedule:
    # 22:05 UTC = 06:05 Hong Kong time.
    - cron: '5 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh published data dates
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Refresh accessed dates
        run: npm run refresh:accessed

      - name: Validate data
        run: npm run validate:data

      - name: Commit refreshed data
        run: |
          set -euo pipefail
          if git diff --quiet -- data/cases.csv data/resources.csv data/prompts.csv; then
            echo "No published data date changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cases.csv data/resources.csv data/prompts.csv
          git commit -m "Refresh published data access dates"
          git push
