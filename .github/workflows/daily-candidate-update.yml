name: Daily AIED Candidate Update

on:
  schedule:
    # 22:00 UTC = 06:00 Hong Kong time.
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  collect-candidates:
    name: Collect candidate teaching cases
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
      SUMMARY_FILE: .tmp/candidate_update_summary.md
      MAX_NEW_CANDIDATES: '12'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare candidate branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          base_branch="main"
          branch_prefix="auto/daily-case-candidates"
          git fetch origin "$base_branch"

          open_branch="$(
            node <<'NODE'
          const repo = process.env.GITHUB_REPOSITORY;
          const token = process.env.GH_TOKEN;
          const branchPrefix = 'auto/daily-case-candidates';

          if (!repo || !token) {
            throw new Error('Missing GitHub repository context or token.');
          }

          const response = await fetch(
            `https://api.github.com/repos/${repo}/pulls?state=open&base=main&per_page=100`,
            {
              headers: {
                authorization: `Bearer ${token}`,
                accept: 'application/vnd.github+json',
                'user-agent': 'AIED Case Hub updater',
                'x-github-api-version': '2022-11-28',
              },
            },
          );

          if (!response.ok) {
            throw new Error(`GitHub API ${response.status} while listing open pull requests`);
          }

          const pulls = await response.json();
          const existing = pulls.find(
            (pull) => pull.head?.repo?.full_name === repo && pull.head?.ref?.startsWith(branchPrefix),
          );

          if (existing) {
            process.stdout.write(existing.head.ref);
          }
          NODE
          )"

          if [ -n "$open_branch" ]; then
            branch="$open_branch"
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"
          else
            branch="${branch_prefix}-$(date +%Y%m%d)-${GITHUB_RUN_NUMBER}"
            git checkout -B "$branch" "origin/$base_branch"
          fi

          echo "CANDIDATE_BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Collect candidate cases
        run: npm run update:candidates

      - name: Validate case data
        run: npm run validate:data

      - name: Commit candidate changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet -- data/candidate_cases.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/candidate_cases.csv
          git commit -m "Add daily AIED candidate cases"
          git push --force-with-lease --set-upstream origin "$CANDIDATE_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node <<'NODE'
          import { readFile } from 'node:fs/promises';

          const repo = process.env.GITHUB_REPOSITORY;
          const token = process.env.GH_TOKEN;
          const branch = process.env.CANDIDATE_BRANCH;
          const summaryPath = process.env.SUMMARY_FILE;

          if (!repo || !token || !branch || !summaryPath) {
            throw new Error('Missing GitHub repository context, token, candidate branch, or summary path.');
          }

          const [owner] = repo.split('/');

          async function github(path, options = {}) {
            const response = await fetch(`https://api.github.com${path}`, {
              method: options.method || 'GET',
              headers: {
                authorization: `Bearer ${token}`,
                accept: 'application/vnd.github+json',
                'content-type': 'application/json',
                'user-agent': 'AIED Case Hub updater',
                'x-github-api-version': '2022-11-28',
              },
              body: options.body ? JSON.stringify(options.body) : undefined,
            });

            const text = await response.text();
            const data = text ? JSON.parse(text) : null;
            if (!response.ok) {
              const message = data?.message || text || `GitHub API ${response.status}`;
              throw new Error(message);
            }
            return data;
          }

          const summary = await readFile(summaryPath, 'utf8');
          const pulls = await github(`/repos/${repo}/pulls?state=open&base=main&per_page=100`);
          const existing = pulls.find(
            (pull) => pull.head?.repo?.full_name === repo && pull.head?.ref === branch,
          );

          if (existing) {
            await github(`/repos/${repo}/issues/${existing.number}/comments`, {
              method: 'POST',
              body: { body: summary },
            });
            console.log(`Updated existing candidate PR #${existing.number}.`);
          } else {
            const pull = await github(`/repos/${repo}/pulls`, {
              method: 'POST',
              body: {
                title: 'Daily AIED candidate case update',
                head: `${owner}:${branch}`,
                base: 'main',
                body: summary,
                maintainer_can_modify: true,
              },
            });
            console.log(`Created candidate PR #${pull.number}.`);
          }
          NODE
