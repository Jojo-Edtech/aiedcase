name: Daily AIED Candidate Update

on:
  schedule:
    # 22:00 UTC = 06:00 Hong Kong time.
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily-candidate-update.yml'
      - 'scripts/collect-candidate-cases.mjs'
      - 'scripts/csv-utils.mjs'
      - 'scripts/validate-data.mjs'
      - 'data/source_feeds.json'
      - 'package.json'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  collect-candidates:
    name: Collect candidate teaching cases
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
      SUMMARY_FILE: .tmp/candidate_update_summary.md
      MAX_NEW_CANDIDATES: '12'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      FIRECRAWL_ENABLED: ${{ vars.FIRECRAWL_ENABLED || 'true' }}
      FIRECRAWL_SEARCH_ENABLED: ${{ vars.FIRECRAWL_SEARCH_ENABLED || 'true' }}
      ARTICLE_ENRICHMENT_ENABLED: ${{ vars.ARTICLE_ENRICHMENT_ENABLED || 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Collect candidate cases
        run: npm run update:candidates

      - name: Validate case data
        run: npm run validate:data

      - name: Commit candidate changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet -- data/candidate_cases.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/candidate_cases.csv
          git commit -m "Update daily AIED candidate pool"
          git pull --rebase origin main
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Report candidate update
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          {
            echo "## Candidate pool updated"
            echo
            echo "The public site now shows these rows as pending-review candidates. Move approved rows from \`data/candidate_cases.csv\` into \`data/cases.csv\` to count them as official cases."
            echo
            if [ -f "$SUMMARY_FILE" ]; then
              cat "$SUMMARY_FILE"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report no candidate changes
        if: steps.changes.outputs.changed != 'true'
        run: |
          {
            echo "## Candidate pool unchanged"
            echo
            if [ -f "$SUMMARY_FILE" ]; then
              cat "$SUMMARY_FILE"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
