<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>全球资源与教材 | AIED Case Hub</title>
    <meta
      name="description"
      content="AIED Case Hub 全球 AI 教育资源、教材、课程、框架与工具包目录，支持按地区、学段、类别和访问方式筛选。"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <a class="skip-link" href="#resources">跳到资源列表</a>

    <header class="site-header">
      <div class="header-inner">
        <div>
          <p class="eyebrow">AI Education Resource Library</p>
          <h1>全球资源与教材</h1>
          <p class="subtitle">AI 教育网页、课程、教材、框架与工具包目录</p>
          <nav class="site-nav" aria-label="主导航">
            <a href="index.html">教学案例</a>
            <a href="resources.html" aria-current="page">全球资源与教材</a>
          </nav>
        </div>
        <div class="header-actions" aria-label="数据操作">
          <a class="button button-secondary" href="data/resources.csv" download>下载资源 CSV</a>
          <a class="button button-primary" href="https://github.com/Jojo-Edtech/aied-case-hub" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </div>
    </header>

    <main>
      <section class="dashboard" aria-label="资源库概览">
        <div class="dashboard-stat">
          <span class="stat-value" id="totalResources">0</span>
          <span class="stat-label">已收录资源</span>
        </div>
        <div class="dashboard-stat">
          <span class="stat-value" id="regionCount">0</span>
          <span class="stat-label">地区/组织来源</span>
        </div>
        <div class="dashboard-stat">
          <span class="stat-value" id="resourceTypeCount">0</span>
          <span class="stat-label">资源类型</span>
        </div>
        <div class="dashboard-stat">
          <span class="stat-value" id="resourceLastAccessed">--</span>
          <span class="stat-label">最近访问日期</span>
        </div>
      </section>

      <section class="toolbar" aria-label="资源检索和筛选">
        <div class="controls controls-resources">
          <label class="field field-wide" for="resourceSearchInput">
            <span>关键词</span>
            <input id="resourceSearchInput" type="search" placeholder="搜索标题、简介、适用方式、发布机构或地区">
          </label>

          <label class="field" for="resourceRegionFilter">
            <span>地区</span>
            <select id="resourceRegionFilter"></select>
          </label>

          <label class="field" for="resourceLevelFilter">
            <span>学段</span>
            <select id="resourceLevelFilter"></select>
          </label>

          <label class="field" for="resourceAudienceFilter">
            <span>受众</span>
            <select id="resourceAudienceFilter"></select>
          </label>

          <label class="field" for="resourceTypeFilter">
            <span>资源类型</span>
            <select id="resourceTypeFilter"></select>
          </label>

          <label class="field" for="resourceCategoryFilter">
            <span>类别</span>
            <select id="resourceCategoryFilter"></select>
          </label>

          <label class="field" for="resourceLanguageFilter">
            <span>语言</span>
            <select id="resourceLanguageFilter"></select>
          </label>

          <label class="field" for="resourceAccessFilter">
            <span>访问方式</span>
            <select id="resourceAccessFilter"></select>
          </label>

          <label class="field" for="resourceSortSelect">
            <span>排序</span>
            <select id="resourceSortSelect">
              <option value="title-asc">标题：A-Z</option>
              <option value="region-asc">地区：A-Z</option>
              <option value="date-desc">发布日期：新到旧</option>
              <option value="date-asc">发布日期：旧到新</option>
              <option value="publisher-asc">发布机构：A-Z</option>
            </select>
          </label>

          <button class="button button-secondary" id="resourceResetFilters" type="button">重置</button>
        </div>
      </section>

      <section class="results-header" aria-live="polite">
        <div>
          <h2 id="resourceResultsTitle">全部资源</h2>
          <p id="resourceResultsMeta">正在读取资源数据...</p>
        </div>
      </section>

      <section class="case-grid resource-grid" id="resources" aria-label="资源列表"></section>
      <section class="empty-state" id="resourceEmptyState" hidden>
        <h2>没有找到匹配资源</h2>
        <p>试试减少筛选条件，或换一个关键词。</p>
      </section>
      <nav class="pagination" id="resourcePagination" aria-label="资源分页" hidden></nav>
    </main>

    <footer class="site-footer">
      <p>资源数据维护：编辑 <code>data/resources.csv</code> 后提交到 GitHub Pages 即可更新。</p>
    </footer>

    <script src="resources.js"></script>
  </body>
</html>
